<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Wzrdoz</title>
  <meta name="description" content="Oops! You've wandered off the magical path.">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg">
  <link rel="shortcut icon" href="/favicon/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #08080f;
      --purple: #a855f7;
      --purple-dark: #7c3aed;
      --white: #f0eaff;
      --grey: #6b5f8a;
      --border: rgba(168, 85, 247, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.4;
    }

    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .nav-logo {
      position: fixed;
      top: 1.5rem;
      left: 2rem;
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--white);
      text-decoration: none;
      z-index: 100;
      transition: color 0.3s;
    }

    .nav-logo span { color: var(--purple); }
    .nav-logo:hover { color: var(--purple); }
    .nav-logo:hover span { color: var(--white); }

    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }

    .error-code {
      font-family: 'Cinzel', serif;
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: 900;
      line-height: 1;
      color: var(--purple);
      text-shadow: 0 0 40px rgba(168, 85, 247, 0.4);
      margin-bottom: 0.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
    }

    .title {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 700;
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.2s;
    }

    .message {
      font-size: 1rem;
      color: var(--grey);
      line-height: 1.8;
      max-width: 420px;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.4s;
    }

    .btn {
      padding: 0.85rem 2.2rem;
      background: linear-gradient(135deg, var(--purple-dark), var(--purple));
      color: var(--white);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border-radius: 2px;
      transition: all 0.3s;
      box-shadow: 0 0 30px rgba(168,85,247,0.2);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.6s;
    }

    .btn:hover {
      box-shadow: 0 0 40px rgba(168,85,247,0.4);
      transform: translateY(-2px);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <a href="/" class="nav-logo">WZRD<span>OZ</span></a>

  <div class="content">
    <div class="error-code">404</div>
    <h1 class="title">Wandered off the map</h1>
    <p class="message">The page you're looking for doesn't exist, was moved, or involves some high-level magic we haven't programmed yet.</p>
    <a href="/" class="btn">Return Home ✦</a>
  </div>

</body>
</html>
