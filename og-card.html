<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Raleway:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #08080f;
      --purple: #a855f7;
      --white: #f0eaff;
      --grey: #6b5f8a;
    }
    body {
      margin: 0;
      padding: 0;
      width: 1200px;
      height: 630px;
      background: var(--bg);
      color: var(--white);
      font-family: 'Raleway', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.15) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero-hat {
      width: 140px;
      margin-bottom: 2rem;
      filter: drop-shadow(0 0 30px rgba(168, 85, 247, 0.6));
      z-index: 10;
    }
    .title {
      font-family: 'Cinzel', serif;
      font-size: 8rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      line-height: 1;
      margin-bottom: 1rem;
      z-index: 10;
    }
    .oz {
      color: var(--purple);
      text-shadow: 0 0 50px rgba(168, 85, 247, 0.5);
    }
    .subtitle {
      font-size: 1.8rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--grey);
      z-index: 10;
    }
  </style>
</head>
<body>
  <svg class="hero-hat" viewBox="0 0 80 90" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#a855f7" />
        <stop offset="100%" style="stop-color:#7c3aed" />
      </linearGradient>
    </defs>
    <ellipse cx="40" cy="72" rx="36" ry="8" fill="#1e1e3a" stroke="#a855f7" stroke-width="1" />
    <polygon points="40,5 18,72 62,72" fill="url(#hg)" />
    <rect x="19" y="63" width="42" height="7" rx="1" fill="#0e0e1a" opacity="0.7" />
    <circle cx="40" cy="5" r="3" fill="#f0eaff" opacity="0.9" />
    <circle cx="55" cy="28" r="1.5" fill="#e2c4ff" opacity="0.7" />
    <circle cx="28" cy="40" r="1" fill="#c084fc" opacity="0.6" />
    <circle cx="52" cy="48" r="1.2" fill="#e2c4ff" opacity="0.5" />
  </svg>
  <div class="title">WZRD<span class="oz">OZ</span></div>
  <div class="subtitle">Web · App · Tech Solutions</div>
</body>
</html>
