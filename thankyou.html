<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Message Sent — Wzrdoz</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #08080f;
      --bg2: #0e0e1a;
      --purple: #a855f7;
      --purple-dark: #7c3aed;
      --purple-dim: #3d2b6e;
      --white: #f0eaff;
      --grey: #6b5f8a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      overflow: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hat {
      width: 70px;
      margin-bottom: 2rem;
      filter: drop-shadow(0 0 20px rgba(168,85,247,0.5));
      animation: fadeUp 0.8s ease forwards;
    }

    .title {
      font-family: 'Cinzel', serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 900;
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.2s;
    }

    .title span { color: var(--purple); }

    .message {
      font-size: 1rem;
      color: var(--grey);
      line-height: 1.8;
      max-width: 420px;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.4s;
    }

    .btn {
      padding: 0.85rem 2.2rem;
      background: linear-gradient(135deg, var(--purple-dark), var(--purple));
      color: var(--white);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border-radius: 2px;
      transition: all 0.3s;
      box-shadow: 0 0 30px rgba(168,85,247,0.2);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.6s;
    }

    .btn:hover {
      box-shadow: 0 0 40px rgba(168,85,247,0.4);
      transform: translateY(-2px);
    }

    .nav-logo {
      position: fixed;
      top: 1.5rem;
      left: 2rem;
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--white);
      text-decoration: none;
    }

    .nav-logo span { color: var(--purple); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <a href="/" class="nav-logo">WZRD<span>OZ</span></a>

  <svg class="hat" viewBox="0 0 80 90" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#a855f7"/>
        <stop offset="100%" style="stop-color:#7c3aed"/>
      </linearGradient>
    </defs>
    <ellipse cx="40" cy="72" rx="36" ry="8" fill="#1e1e3a" stroke="#a855f7" stroke-width="1"/>
    <polygon points="40,5 18,72 62,72" fill="url(#hg)"/>
    <rect x="19" y="63" width="42" height="7" rx="1" fill="#0e0e1a" opacity="0.7"/>
    <circle cx="40" cy="5" r="3" fill="#f0eaff" opacity="0.9"/>
    <circle cx="55" cy="28" r="1.5" fill="#e2c4ff" opacity="0.7"/>
    <circle cx="28" cy="40" r="1" fill="#c084fc" opacity="0.6"/>
  </svg>

  <h1 class="title">Message <span>Received</span></h1>
  <p class="message">Thanks for reaching out! I'll get back to you within 24 hours. Looking forward to working together.</p>
  <a href="/" class="btn">Back to Home ✦</a>

</body>
</html>
