<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Message Sent — Wzrdoz</title>
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png">
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg">
  <link rel="manifest" href="/favicon/site.webmanifest">
  <link rel="shortcut icon" href="/favicon/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #08080f;
      --bg2: #0e0e1a;
      --purple: #a855f7;
      --purple-dark: #7c3aed;
      --purple-dim: #3d2b6e;
      --white: #f0eaff;
      --grey: #6b5f8a;
      --border: rgba(168, 85, 247, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .page-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    body::after {
      content: '';
      position: fixed;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .hat {
      width: 70px;
      margin-bottom: 2rem;
      filter: drop-shadow(0 0 20px rgba(168,85,247,0.5));
      animation: fadeUp 0.8s ease forwards;
    }

    .title {
      font-family: 'Cinzel', serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 900;
      margin-bottom: 1rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.2s;
    }

    .title span { color: var(--purple); }

    .message {
      font-size: 1rem;
      color: var(--grey);
      line-height: 1.8;
      max-width: 420px;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.4s;
    }

    .btn {
      padding: 0.85rem 2.2rem;
      background: linear-gradient(135deg, var(--purple-dark), var(--purple));
      color: var(--white);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border-radius: 2px;
      transition: all 0.3s;
      box-shadow: 0 0 30px rgba(168,85,247,0.2);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.6s;
    }

    .btn:hover {
      box-shadow: 0 0 40px rgba(168,85,247,0.4);
      transform: translateY(-2px);
    }

    .nav-logo {
      position: fixed;
      top: 1.5rem;
      left: 2rem;
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--white);
      text-decoration: none;
    }

    .nav-logo span { color: var(--purple); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 2.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .footer-logo {
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      letter-spacing: 0.15em;
      color: var(--white);
    }

    .footer-logo span { color: var(--purple); }

    .footer-social {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .footer-social a {
      color: rgba(240, 234, 255, 0.5);
      transition: color 0.3s;
      display: flex;
    }

    .footer-social a:hover { color: var(--purple); }

    .footer-copy {
      font-size: 0.75rem;
      color: rgba(240, 234, 255, 0.4);
      letter-spacing: 0.1em;
    }
  </style>
</head>

  <a href="/" class="nav-logo">WZRD<span>OZ</span></a>

        <stop offset="0%" style="stop-color:#a855f7"/>

    <circle cx="40" cy="5" r="3" fill="#f0eaff" opacity="0.9"/>
    <circle cx="55" cy="28" r="1.5" fill="#e2c4ff" opacity="0.7"/>

  </div>

    <div class="footer-social">

      </a>
      <span class="footer-copy">© 2026 Wzrdoz · Web, App & Tech Solutions</span>

</body>
</html>
