<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&amp;family=Raleway:wght@400;600&amp;display=swap');
      .title { font-family: 'Cinzel', serif; font-size: 42px; font-weight: 900; letter-spacing: 0.05em; }
      .wzrd { fill: #f0eaff; }
      .oz { fill: #a855f7; filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.4)); }
      .tagline { font-family: 'Raleway', sans-serif; font-size: 11px; letter-spacing: 0.3em; fill: #6b5f8a; text-transform: uppercase; }
    </style>
    <linearGradient id="hatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08080f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e0e1a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="120" rx="12" fill="url(#bgGrad)"/>

  <!-- Subtle purple ambient glow behind hat -->
  <ellipse cx="60" cy="75" rx="38" ry="18" fill="#7c3aed" opacity="0.15"/>

  <!-- Wizard Hat -->
  <!-- Brim -->
  <ellipse cx="60" cy="80" rx="34" ry="7" fill="#1e1e3a" stroke="#a855f7" stroke-width="1.2"/>
  <!-- Hat body -->
  <polygon points="60,18 38,80 82,80" fill="url(#hatGrad)" opacity="0.95"/>
  <!-- Hat band -->
  <rect x="39" y="70" width="42" height="7" rx="1" fill="#0e0e1a" opacity="0.7"/>
  
  <!-- Sparkle dots -->
  <circle cx="68" cy="34" r="1.5" fill="#e2c4ff" opacity="0.8" filter="url(#glow)"/>
  <circle cx="54" cy="50" r="1" fill="#c084fc" opacity="0.6"/>
  <circle cx="72" cy="55" r="1.2" fill="#e2c4ff" opacity="0.5"/>

  <!-- Tip sparkle -->
  <circle cx="60" cy="18" r="2.5" fill="#f0e0ff" opacity="0.9" filter="url(#glow)"/>

  <!-- Wordmark -->
  <text x="115" y="66" class="title"><tspan class="wzrd">WZRD</tspan><tspan class="oz">OZ</tspan></text>

  <!-- Tagline -->
  <text x="118" y="86" class="tagline">WEB · APP · TECH SOLUTIONS</text>
</svg>
